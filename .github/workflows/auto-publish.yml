name: Auto-publish on version bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  check:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.tag.outputs.should_publish }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "
          import re
          m = re.search(r'__version__ = \"(.+)\"', open('pelican_katex/__init__.py').read())
          print(m.group(1))
          ")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check if version tag already exists
        id: tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install ".[test]"

      - name: Run tests
        run: pytest test/

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check.outputs.version }}"
          git push origin "v${{ needs.check.outputs.version }}"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
