name: Update bundled KaTeX

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-katex:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check for and apply KaTeX update
        id: update
        run: python3 scripts/update_katex.py

      - name: Bump plugin patch version
        if: steps.update.outputs.newer == 'true'
        run: |
          python3 <<'EOF'
          import re
          path = 'pelican_katex/__init__.py'
          content = open(path).read()
          m = re.search(r'__version__ = "(\d+)\.(\d+)\.(\d+)"', content)
          major, minor, patch = m.group(1), m.group(2), int(m.group(3))
          new = f'{major}.{minor}.{patch + 1}'
          content = re.sub(r'__version__ = "\d+\.\d+\.\d+"', f'__version__ = "{new}"', content)
          open(path, 'w').write(content)
          EOF

      - name: Create or update pull request
        if: steps.update.outputs.newer == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update bundled KaTeX to v${{ steps.update.outputs.new_version }}
          title: Update bundled KaTeX to v${{ steps.update.outputs.new_version }}
          body: Automated update of bundled KaTeX from upstream release assets.
          branch: chore/update-katex-v${{ steps.update.outputs.new_version }}
          delete-branch: true
          add-paths: |
            pelican_katex/katex.*.js
            pelican_katex/__init__.py
